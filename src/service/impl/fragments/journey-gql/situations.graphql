fragment situation on PtSituationElement {
  id
  situationNumber
  summary {
    ...multilingualString
  }
  description {
    ...multilingualString
  }
  reportType
  advice {
    ...multilingualString
  }
  infoLinks {
    ...infoLink
  }
  validityPeriod {
    ...validityPeriod
  }
  affects {
    __typename
    ... on AffectedStopPlace {
      stopPlace {
        name
      }
      quay {
        name
      }
    }
    ... on AffectedStopPlaceOnServiceJourney {
      stopPlace {
        name
      }
      quay {
        name
      }
    }
    ... on AffectedStopPlaceOnLine {
      stopPlace {
        name
      }
      quay {
        name
      }
    }
  }
}