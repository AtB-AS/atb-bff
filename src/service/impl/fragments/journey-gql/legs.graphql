fragment leg on Leg {
    id
    mode
    distance
    duration
    aimedStartTime
    aimedEndTime
    expectedEndTime
    expectedStartTime
    realtime
    line {
        ...line
        name
    }
    fromEstimatedCall {
        actualDepartureTime
        aimedDepartureTime
        expectedDepartureTime
        destinationDisplay {
            frontText
            via
        }
        quay {
            publicCode
            name
        }
        notices {
            ...notice
        }
        situations {
            ...situation
        }
        stopPositionInPattern
        cancellation
    }
    toEstimatedCall {
        actualArrivalTime
        notices {
            ...notice
        }
        situations {
            ...situation
        }
        stopPositionInPattern
        cancellation
    }
    situations {
        ...situation
    }
    fromPlace {
        name
        longitude
        latitude
        quay {
            id
            publicCode
            name
            longitude
            latitude
            description
            stopPlace {
                ...stopPlace
            }
            situations {
                ...situation
            }
            tariffZones {
                ...tariffZone
            }
        }
    }
    toPlace {
        name
        longitude
        latitude
        quay {
            id
            publicCode
            name
            longitude
            latitude
            description
            stopPlace {
                ...stopPlace
            }
            situations {
                ...situation
            }
            tariffZones {
                ...tariffZone
            }
        }
    }
    serviceJourney {
        id
        notices {
            ...notice
        }
        journeyPattern {
            notices {
                ...notice
            }
        }
    }
    interchangeTo {
        ...interchange
    }
    interchangeFrom {
        ...interchange
    }
    pointsOnLink {
        points
        length
    }
    intermediateEstimatedCalls {
        quay {
            name
            id
            stopPlace {
                ...stopPlace
            }
        }
        date
        stopPositionInPattern
        aimedDepartureTime
        expectedDepartureTime
        realtime
        forAlighting
        forBoarding
        notices {
            ...notice
        }
    }
    authority {
        ...authority
    }
    transportSubmode
    serviceJourneyEstimatedCalls {
        actualDepartureTime
        realtime
        aimedDepartureTime
        expectedDepartureTime
        quay {
            name
        }
        predictionInaccurate
        cancellation
    }
    bookingArrangements {
        ...bookingArrangement
    }
    datedServiceJourney {
        id
        estimatedCalls {
            actualDepartureTime
            quay {
                name
            }
            predictionInaccurate
        }
    }
    rentedBike
}
