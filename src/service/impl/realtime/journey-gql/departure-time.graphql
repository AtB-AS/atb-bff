query GetDepartureRealtime(
  $quayIds: [String]!
  $startTime: DateTime!
  $timeRange: Int!
  $limit: Int!
  $limitPerLine: Int
  $filters: [EstimatedCallFilterInput!]
) {
  quays(ids: $quayIds) {
    id
    estimatedCalls(
      startTime: $startTime
      numberOfDepartures: $limit,
      numberOfDeparturesPerLineAndDestinationDisplay: $limitPerLine
      timeRange: $timeRange
      arrivalDeparture: departures
      includeCancelledTrips: false
      filters: $filters
    ) {
      ...estimatedCall
    }
  }
}

fragment estimatedCall on EstimatedCall {
  realtime
  serviceJourney {
    id
  }
  expectedArrivalTime
  expectedDepartureTime
  actualArrivalTime
  actualDepartureTime
  aimedArrivalTime
  aimedDepartureTime
}
